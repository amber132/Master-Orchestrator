name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Smoke check CLI help
        run: python -m master_orchestrator --help

      - name: Smoke check DAG visualize
        run: python -m master_orchestrator.cli visualize workflows/test_backward_compat.toml
