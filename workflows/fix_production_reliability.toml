[tasks.p1_adaptive_pool]
prompt = """修复 AdaptiveThreadPool 的多个并发问题。

文件: claude_orchestrator/adaptive_pool.py

问题 1 - _adjuster 死锁: 持锁调用 _add_worker 而后者也获取锁。
修复: 重写 _adjuster，将 _add_worker 调用移到锁外:
    def _adjuster(self):
        while not self.shutdown_flag:
            time.sleep(self.adjust_interval)
            if self.shutdown_flag:
                break
            workers_to_add = 0
            with self.lock:
                current_workers = self.current_workers
                pending_tasks = self.task_queue.qsize()
                active_workers = self.active_count
                if current_workers < self.min_workers:
                    workers_to_add = self.min_workers - current_workers
                    self.target_workers = max(self.target_workers, self.min_workers)
                elif pending_tasks > 0 and (active_workers == 0 or pending_tasks / max(active_workers, 1) > 2):
                    if current_workers < self.max_workers:
                        new_workers = max(1, int(current_workers * 0.25))
                        new_workers = min(new_workers, self.max_workers - current_workers)
                        self.target_workers = current_workers + new_workers
                        workers_to_add = new_workers
                elif current_workers > 0 and active_workers / max(current_workers, 1) < 0.3:
                    if current_workers > self.min_workers:
                        remove_workers = max(1, int(current_workers * 0.25))
                        remove_workers = min(remove_workers, current_workers - self.min_workers)
                        self.target_workers = current_workers - remove_workers
            for _ in range(workers_to_add):
                self._add_worker()

问题 2 - submit 闭包 bug: lambda 捕获引用。改为默认参数绑定:
    def submit(self, fn, *args, **kwargs):
        with self.lock:
            if self.shutdown_flag or not self._accepting:
                raise RuntimeError("线程池已关闭，无法提交新任务")
        future = Future()
        def task(_fn=fn, _args=args, _kwargs=kwargs):
            return _fn(*_args, **_kwargs)
        self.task_queue.put((task, future))
        return future

问题 3 - shutdown 不等 worker: __init__ 加 self._workers = []，_add_worker 中 worker.start() 后加 self._workers.append(worker)，shutdown 中 join 后加 for w in self._workers: w.join(timeout=5)

问题 4 - metrics 类型: Dict[str, int] 改 Dict[str, Any]"""
depends_on = ["p0_merged_outputs", "p0_shutdown"]
model = "sonnet"
timeout = 300

[tasks.p1_cycle_detect]
prompt = """在 Scheduler 中添加 DAG 循环依赖检测。

文件: claude_orchestrator/scheduler.py

在 __init__ 末尾（self._lock 初始化后）添加 self._detect_cycles() 调用，并添加方法:

    def _detect_cycles(self) -> None:
        in_degree = {}
        for tid, task in self._dag.tasks.items():
            in_degree.setdefault(tid, 0)
            for dep in task.depends_on:
                if dep in self._dag.tasks:
                    in_degree[tid] = in_degree.get(tid, 0) + 1
        queue_list = [tid for tid, deg in in_degree.items() if deg == 0]
        visited = 0
        while queue_list:
            node = queue_list.pop(0)
            visited += 1
            for tid, task in self._dag.tasks.items():
                if node in task.depends_on:
                    in_degree[tid] -= 1
                    if in_degree[tid] == 0:
                        queue_list.append(tid)
        if visited < len(self._dag.tasks):
            cycle_tasks = [tid for tid, deg in in_degree.items() if deg > 0]
            raise ValueError(f"DAG 存在循环依赖: {cycle_tasks[:10]}")"""
model = "sonnet"
timeout = 180

